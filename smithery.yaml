# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - browsercatApiKey
    properties:
      browsercatApiKey:
        type: string
        description: Your BrowserCat API key
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { BROWSERCAT_API_KEY: config.browsercatApiKey } })
  exampleConfig:
    browsercatApiKey: YOUR_API_KEY_HERE
